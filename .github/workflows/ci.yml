name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        # This tells your Python code "We are in GitHub, don't try to load the real model"
        env:
          CI: true
        run: pytest

  build-and-push-api:
    runs-on: ubuntu-latest
    needs: test-api
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ADD THIS STEP: It sets up the environment for all subsequent AWS steps
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.api \
          -t course-completion-api .

      - name: Tag Docker image
        run: |
          docker tag course-completion-api:latest \
          685251218327.dkr.ecr.eu-north-1.amazonaws.com/course-completion-api:latest

      - name: Push Docker image to ECR
        run: |
          docker push \
          685251218327.dkr.ecr.eu-north-1.amazonaws.com/course-completion-api:latest